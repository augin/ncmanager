<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WireGuard Manager</title>
<link rel="stylesheet" href="/static/css/style.css?v=2026062902">
</head>
<body>
<div id="app">
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>WireGuard Manager</h1>
      <p>Введите пароль</p>
      <form id="loginForm">
        <input type="password" id="password" placeholder="Пароль" autofocus>
        <button type="submit">Войти</button>
      </form>
      <p class="hint">По умолчанию: admin</p>
    </div>

  <header class="topbar">
    <h1>WireGuard Manager</h1>
    <div>
      <span class="status-badge" id="statusBadge">Проверка...</span>
      <button onclick="toggleServer()" id="btnToggle">Запустить</button>
      <button onclick="logout()">Выход</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" onclick="switchTab('peers', this)">Пиры</button>
    <button class="tab" onclick="switchTab('dns', this)">DNS маршрутизация</button>
    <button class="tab" onclick="switchTab('settings', this)">Настройки</button>
    <button class="tab" onclick="switchTab('logs', this)">Логи</button>
  </nav>

  <main>
    <section class="card" id="tab-peers">
      <h2>Пиры</h2>
      <div class="add-peer">
        <input id="peerName" placeholder="Имя пира">
        <button onclick="addPeer()">Добавить</button>
      </div>
      <div id="peersTable"></div>
    </section>

    <section class="card" id="tab-dns" style="display:none">
      <h2>DNS маршрутизация</h2>
      <div class="dns-section">
        <div class="dns-actions" style="margin-bottom:16px">
          <button onclick="showAddDnsRoute()" class="btn-qr">+ Новый маршрут</button>
          <button onclick="applyDnsRoutes()" class="btn-dl">Настроить DNS</button>
          <button onclick="loadDnsRoutes()" class="btn-dl">Обновить</button>
        </div>
        <div id="dnsRouteList" class="dns-route-list">
          <p style="color:#64748b">Загрузка...</p>
        </div>

        <div class="preset-catalog" id="presetCatalog" style="margin-top:24px">
          <div class="preset-header">
            <h3 style="margin:0 0 8px 0">Готовые маршруты</h3>
            <div class="preset-filters" id="presetFilters"></div>
          </div>
          <div class="preset-grid" id="presetGrid"></div>
        </div>
  <div class="dns-modal-overlay" id="dnsRouteModalOverlay" style="display:none">
    <div class="dns-modal">
      <div class="form-group">
        <label>Название</label>
        <input type="text" id="dnsRouteName" placeholder="Например: YouTube">
      </div>
      <div class="form-group">
        <label>Домены (по одному на строку)</label>
        <textarea id="dnsRouteDomains" placeholder="youtube.com&#10;googlevideo.com&#10;..."></textarea>
      </div>
      <div class="form-group">
        <label>CIDR / IP подсети (по одной на строку)</label>
        <textarea id="dnsRouteSubnets" placeholder="173.245.48.0/20&#10;103.21.244.0/22&#10;..."></textarea>
        <div class="domain-hint">Опционально: IP-диапазоны для маршрутизации</div>
      </div>
      <div class="actions">
        <button class="btn-dl" onclick="hideDnsRouteModal()">Отмена</button>
        <button class="btn-qr" onclick="saveDnsRouteModal()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js?v=2026062909"></script>
</body>
</html>
