name: Debian package

on:
  release:
    types: [created]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          go mod tidy
          go build -o ncmanager .
          mkdir -p _output/usr/local/bin
          mv ncmanager _output/usr/local/bin/

      - name: Create DEB control file
        run: |
          mkdir -p _output/DEBIAN
          cat > _output/DEBIAN/control <<EOF
          Package: wireguard-manager
          Version: ${{ github.event.release.tag_name }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Your Name <you@example.com>
          Depends: wireguard, wireguard-tools, iptables
          Description: NC Manager
          EOF

      - name: Add systemd service
        run: |
          mkdir -p _output/usr/lib/systemd/system
          cp ncmanager.service _output/usr/lib/systemd/system/ncmanager.service

      - name: Add postinst for IP forwarding and systemd
        run: |
          cat > _output/DEBIAN/postinst <<'EOF'
          #!/bin/bash
          set -e
          echo 'net.ipv4.ip_forward=1' > /etc/sysctl.d/99-ncmanager.conf
          sysctl -p /etc/sysctl.d/99-ncmanager.conf || true
          systemctl daemon-reload || true
          systemctl enable --now ncmanager || true
          EOF
          chmod 0755 _output/DEBIAN/postinst

      - name: Add prerm to stop service
        run: |
          cat > _output/DEBIAN/prerm <<'EOF'
          #!/bin/bash
          set -e
          systemctl stop ncmanager || true
          EOF
          chmod 0755 _output/DEBIAN/prerm

      - name: Build deb package
        run: dpkg-deb --build _output

      - name: Rename deb package
        run: cp _output.deb ncmanager_${{ github.event.release.tag_name }}.deb

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ncmanager_${{ github.event.release.tag_name }}.deb
